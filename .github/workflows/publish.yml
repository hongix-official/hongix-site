name: Publish site

# Rebuilds from Notion + deploys to Cloudflare Pages.
# - every 30 min: picks up new Notion posts automatically (repo is public -> unlimited Actions minutes)
# - manual: "Run workflow" button in the Actions tab (instant publish)
# - on push to main: redeploys code changes
on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch: {}
  push:
    branches: [main]

concurrency:
  group: publish
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      # Drop the macOS-generated lockfile so npm resolves the Linux rollup native
      # binary fresh (npm optional-deps bug: npm/cli#4828).
      - run: rm -f package-lock.json && npm install --no-audit --no-fund
      - run: npx playwright install --with-deps chromium
      - name: Build (Notion + prerender)
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DB: ${{ secrets.NOTION_DB }}
        run: npm run build
      - name: Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler@4 pages deploy dist --project-name hongix --branch main --commit-dirty=true
